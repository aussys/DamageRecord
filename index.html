<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Damage Recorder</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; padding: 12px; }
button, select, input { width: 100%; padding: 12px; margin: 6px 0; }
video { width: 100%; }
#reader { width: 100%; }
</style>
</head>

<body>

<h2>Damage Recorder</h2>

<select id="parent">
  <option value="1">Damage Form [1]</option>
  <option value="2">Damage Form [2]</option>
</select>

<input id="barcode" placeholder="Scan barcode" readonly>

<button onclick="scanBarcode()">Scan Barcode</button>

<div id="reader"></div>

<hr>

<video id="preview" autoplay playsinline muted></video>

<button onclick="startRecording()">Start</button>
<button onclick="stopRecording()">Stop</button>
<button onclick="save()">Save</button>

<hr>

<div id="status"></div>
<div id="queueInfo"></div>

<script>

const SCRIPT_URL = https://script.google.com/a/macros/shopeemobile-external.com/s/AKfycbx-UDv7hTjkieUmIzX_9K1uoG76MzECrmjQcPRbZ0W4VxosMKSBU7H2OPUiUJFuaxit/exec";

// ---------------- IndexedDB ----------------

const DB_NAME = "damage_queue";
let db;

function openDB() {
  return new Promise((resolve) => {
    const req = indexedDB.open(DB_NAME, 1);

    req.onupgradeneeded = e => {
      const db = e.target.result;
      db.createObjectStore("queue", { keyPath: "id", autoIncrement: true });
    };

    req.onsuccess = e => {
      db = e.target.result;
      resolve(db);
    };
  });
}

function addDB(item) {
  const tx = db.transaction("queue", "readwrite");
  tx.objectStore("queue").add(item);
}

function getAllDB() {
  return new Promise(resolve => {
    const tx = db.transaction("queue", "readonly");
    const req = tx.objectStore("queue").getAll();
    req.onsuccess = () => resolve(req.result);
  });
}

function deleteDB(id) {
  const tx = db.transaction("queue", "readwrite");
  tx.objectStore("queue").delete(id);
}

// ---------------- STATE ----------------

let scanner;
let recorder;
let stream;
let chunks = [];
let blob = null;
let uploading = false;

// ---------------- INIT ----------------

openDB().then(processQueue);

// ---------------- UI ----------------

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

// ---------------- BARCODE ----------------

function scanBarcode() {

  document.getElementById("reader").innerHTML = "";

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(cams => {

    const cam = cams[cams.length - 1].id;

    scanner.start(cam, { fps: 10, qrbox: 250 }, text => {

      document.getElementById("barcode").value = text;

      scanner.stop();
      document.getElementById("reader").innerHTML = "";

    });

  });

}

// ---------------- RECORD ----------------

async function startRecording() {

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment", width: 640, height: 480 },
    audio: true
  });

  document.getElementById("preview").srcObject = stream;

  recorder = new MediaRecorder(stream, {
    mimeType: "video/webm;codecs=vp8",
    videoBitsPerSecond: 300000
  });

  chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.start();

  setStatus("Recording...");
}

function stopRecording() {

  return new Promise(resolve => {

    recorder.onstop = () => {

      blob = new Blob(chunks, { type: "video/webm" });

      stream.getTracks().forEach(t => t.stop());

      setStatus("Ready");

      resolve();
    };

    recorder.stop();
  });

}

// ---------------- SAVE ----------------

async function save() {

  const barcode = document.getElementById("barcode").value;
  const parent = document.getElementById("parent").value;

  if (!barcode || !blob) return alert("Missing data");

  addDB({
    barcode,
    parent,
    blob,
    retries: 0,
    time: Date.now()
  });

  blob = null;
  document.getElementById("barcode").value = "";

  setStatus("Saved ✔");

  processQueue();
}

// ---------------- BASE64 ----------------

function blobToBase64(blob) {
  return new Promise(res => {
    const r = new FileReader();
    r.onloadend = () => res(r.result.split(",")[1]);
    r.readAsDataURL(blob);
  });
}

// ---------------- UPLOAD ----------------

async function uploadItem(item) {

  const base64 = await blobToBase64(item.blob);

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      barcode: item.barcode,
      parent: item.parent,
      file: base64
    })
  });

  const text = await res.text();

  if (text !== "OK") throw new Error(text);
}

// ---------------- QUEUE ENGINE ----------------

async function processQueue() {

  if (uploading) return;
  uploading = true;

  while (true) {

    const items = await getAllDB();
    if (items.length === 0) break;

    const item = items[0];

    try {

      setStatus("Uploading...");

      await uploadItem(item);

      deleteDB(item.id);

      setStatus("Uploaded ✔");

    } catch (e) {

      item.retries++;

      if (item.retries > 5) {
        deleteDB(item.id);
        setStatus("Dropped failed item");
      } else {
        await new Promise(r => setTimeout(r, 2000 * item.retries));
      }
    }
  }

  uploading = false;
  setStatus("Idle");
}

</script>

</body>
</html>
