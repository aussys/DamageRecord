<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Damage Upload</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:30px auto;
    padding:20px;
}

.row{
    display:flex;
    gap:10px;
}

input,
select,
button{
    padding:12px;
}

select{
    flex:1;
}

#folderName{
    flex:1;
}

button{
    cursor:pointer;
}

#status{
    margin-top:20px;
}

progress{
    width:100%;
    display:none;
}

video{
    width:100%;
    margin-top:10px;
}

#scannerModal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.85);
    z-index:9999;
}

#scannerContent{
    background:white;
    margin:20px;
    padding:15px;
    border-radius:10px;
}

#reader{
    width:100%;
}
</style>
</head>
<body>

<div id="scannerModal">
    <div id="scannerContent">

        <h3>Scan Barcode</h3>

        <div id="reader"></div>

        <br>

        <button onclick="closeScanner()">
            Close
        </button>

    </div>
</div>

<h2>Damage Video Upload</h2>

<div class="row">

<select id="folderSelect">
<option value="1">Damage Form [1]</option>
<option value="2">Damage Form [2]</option>
</select>

<button id="lockBtn">
🔒 Lock
</button>

</div>

<br>

<div class="row">

<input
    id="folderName"
    placeholder="Folder Name / Barcode">

<button id="scanBtn">
📷 Scan
</button>

</div>

<br>

<input
type="file"
id="videoFile"
accept="video/*"
capture="environment">

<video
id="preview"
controls
style="display:none">
</video>

<br><br>

<button id="uploadBtn">
Upload
</button>

<br><br>

<progress
id="progress"
max="100"
value="0">
</progress>

<div id="status"></div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxY4JKOrVwsgkcLBNLnfM8erlcrT-YFq6gAazH1j0H_6qzD6IgoPyXlRW7rHBnJOaEM/exec";

const folderSelect =
document.getElementById("folderSelect");

const lockBtn =
document.getElementById("lockBtn");

const folderName =
document.getElementById("folderName");

const progress =
document.getElementById("progress");

const statusDiv =
document.getElementById("status");

const preview =
document.getElementById("preview");

let scanner = null;
async function compressVideo(file){

    statusDiv.innerHTML =
    "Compressor unavailable, using original video";

    return file;
}

    statusDiv.innerHTML =
    "Compressing video...";

    await ffmpeg.exec([

        "-i",
        "input.mp4",

        "-vf",
        "scale=1280:-2",

        "-c:v",
        "libx264",

        "-preset",
        "fast",

        "-crf",
        "30",

        "-c:a",
        "aac",

        "-b:a",
        "96k",

        "output.mp4"
    ]);

    const data =
    await ffmpeg.readFile(
        "output.mp4"
    );

    return new File(
        [data.buffer],
        "Video.mp4",
        {
            type:"video/mp4"
        }
    );
}

function loadSettings(){

    const savedFolder =
        localStorage.getItem(
            "selectedFolder"
        );

    const locked =
        localStorage.getItem(
            "folderLocked"
        );

    if(savedFolder){
        folderSelect.value =
            savedFolder;
    }

    if(locked === "true"){

        folderSelect.disabled =
            true;

        lockBtn.innerText =
            "🔓 Unlock";
    }
}

loadSettings();

lockBtn.onclick = function(){

    if(folderSelect.disabled){

        folderSelect.disabled =
            false;

        localStorage.setItem(
            "folderLocked",
            "false"
        );

        lockBtn.innerText =
            "🔒 Lock";

    }else{

        folderSelect.disabled =
            true;

        localStorage.setItem(
            "folderLocked",
            "true"
        );

        localStorage.setItem(
            "selectedFolder",
            folderSelect.value
        );

        lockBtn.innerText =
            "🔓 Unlock";
    }
};

folderSelect.onchange = function(){

    localStorage.setItem(
        "selectedFolder",
        folderSelect.value
    );
};

document
.getElementById("videoFile")
.onchange = function(){

    const file =
        this.files[0];

    if(!file){
        return;
    }

    preview.src =
        URL.createObjectURL(file);

    preview.style.display =
        "block";
};

document
.getElementById("scanBtn")
.addEventListener(
    "click",
    startScanner
);

async function startScanner(){

    document
    .getElementById(
        "scannerModal"
    )
    .style.display =
    "block";

    scanner =
    new Html5Qrcode(
        "reader"
    );

    try{

        await scanner.start(
            {
                facingMode:
                "environment"
            },
            {
                fps:10,
                qrbox:250
            },
            function(decodedText){

                folderName.value =
                    decodedText;

                closeScanner();
            }
        );

    }catch(err){

        alert(
            "Camera Error: " +
            err
        );

        closeScanner();
    }
}

async function closeScanner(){

    if(scanner){

        try{
            await scanner.stop();
        }catch(e){}

        try{
            scanner.clear();
        }catch(e){}

        scanner = null;
    }

    document
    .getElementById(
        "scannerModal"
    )
    .style.display =
    "none";
}

document
.getElementById("uploadBtn")
.onclick =
async function(){

    const file =
    document
    .getElementById(
        "videoFile"
    )
    .files[0];

    if(!file){

        alert(
            "Select video"
        );

        return;
    }

    if(
        !file.type.startsWith(
            "video/"
        )
    ){
        alert(
            "Video only"
        );
        return;
    }

    if(
        !folderName.value.trim()
    ){

        alert(
            "Folder name required"
        );

        return;
    }
const MAX_SIZE =
19 * 1024 * 1024;

let uploadFile =
file;

if(
    file.size >
    MAX_SIZE
){

    statusDiv.innerHTML =
    "Video too large. Compressing...";

    uploadFile =
    await compressVideo(
        file
    );

    if(
        uploadFile.size >
        MAX_SIZE
    ){

        alert(
            "Compressed video still exceeds 19 MB"
        );

        return;
    }

    statusDiv.innerHTML =
    "Compression complete";
}
    
    progress.style.display =
        "block";

    progress.value = 20;

    const reader =
    new FileReader();

    reader.onload =
    async function(e){

        progress.value = 60;

        const base64 =
        e.target.result
        .split(",")[1];

        try{

            const response =
            await fetch(
                SCRIPT_URL,
                {
                    method:"POST",
                    body:JSON.stringify({

                        folder:
                        folderSelect.value,

                        folderName:
                        folderName.value.trim(),

                        fileName:
                        "Video.mp4",

                        mimeType:
                        "video/mp4",

                        fileData:
                        base64
                    })
                }
            );

            const result =
            await response.json();

            progress.value = 100;

            if(
                result.success
            ){

                statusDiv.innerHTML =
                "✅ Uploaded";

            }else{

                statusDiv.innerHTML =
                "❌ " +
                result.error;
            }

        }catch(err){

            statusDiv.innerHTML =
            "❌ Upload failed: " +
            err.message;
        }
    };

    reader.readAsDataURL(
    uploadFile
);
};

</script>

</body>
</html>
