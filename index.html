<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Damage Recorder</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; padding: 12px; }
button, select, input { width: 100%; padding: 12px; margin: 6px 0; }
video { width: 100%; }
#reader { width: 100%; }
small { color: gray; }
</style>
</head>

<body>

<h2>Damage Recorder</h2>

<select id="parent">
  <option value="1">Damage Form [1]</option>
  <option value="2">Damage Form [2]</option>
</select>

<input id="barcode" placeholder="Scan barcode" readonly>

<button onclick="scanBarcode()">Scan Barcode</button>

<div id="reader"></div>

<hr>

<video id="preview" autoplay playsinline muted></video>

<button onclick="startRecording()">Start</button>
<button onclick="stopRecording()">Stop</button>
<button onclick="save()">Save</button>

<hr>

<div id="status"></div>
<div id="queueInfo"></div>

<script>

const SCRIPT_URL = "https://script.google.com/a/macros/shopeemobile-external.com/s/AKfycbx-UDv7hTjkieUmIzX_9K1uoG76MzECrmjQcPRbZ0W4VxosMKSBU7H2OPUiUJFuaxit/exec";

// ================= IndexedDB =================

const DB_NAME = "damage_queue";
let db;

function openDB() {

  return new Promise((resolve, reject) => {

    const req = indexedDB.open(DB_NAME, 1);

    req.onupgradeneeded = e => {
      const db = e.target.result;
      db.createObjectStore("queue", { keyPath: "id", autoIncrement: true });
    };

    req.onsuccess = e => {
      db = e.target.result;
      resolve(db);
    };

    req.onerror = reject;

  });

}

// ================= DB HELPERS =================

function addToDB(item) {

  const tx = db.transaction("queue", "readwrite");
  tx.objectStore("queue").add(item);

}

function getAll() {

  return new Promise(resolve => {

    const tx = db.transaction("queue", "readonly");
    const req = tx.objectStore("queue").getAll();

    req.onsuccess = () => resolve(req.result);

  });

}

function deleteItem(id) {

  const tx = db.transaction("queue", "readwrite");
  tx.objectStore("queue").delete(id);

}

// ================= STATE =================

let scanner;
let recorder;
let stream;
let chunks = [];
let recordedBlob = null;
let uploading = false;

// ================= INIT =================

openDB().then(() => {
  processQueue();
  refreshUI();
});

// ================= UI =================

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

async function refreshUI() {

  const q = await getAll();

  document.getElementById("queueInfo").innerText =
    "Pending uploads: " + q.length;

}

// ================= BARCODE =================

function scanBarcode() {

  document.getElementById("reader").innerHTML = "";

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(cameras => {

    const camId = cameras[cameras.length - 1].id;

    scanner.start(
      camId,
      { fps: 10, qrbox: 250 },
      text => {

        document.getElementById("barcode").value = text;

        scanner.stop();
        document.getElementById("reader").innerHTML = "";

      }
    );

  });

}

// ================= RECORD =================

async function startRecording() {

  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { ideal: 640 },
      height: { ideal: 480 }
    },
    audio: true
  });

  document.getElementById("preview").srcObject = stream;

  recorder = new MediaRecorder(stream, {
    mimeType: "video/webm;codecs=vp8",
    videoBitsPerSecond: 300000
  });

  chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.start();

  setStatus("Recording...");
}

// ================= STOP =================

function stopRecording() {

  return new Promise(resolve => {

    recorder.onstop = () => {

      recordedBlob = new Blob(chunks, { type: "video/webm" });

      stream.getTracks().forEach(t => t.stop());

      setStatus("Ready to save");

      resolve();
    };

    recorder.stop();
  });

}

// ================= SAVE =================

async function save() {

  const barcode = document.getElementById("barcode").value;
  const parent = document.getElementById("parent").value;

  if (!barcode || !recordedBlob) {
    alert("Missing data");
    return;
  }

  addToDB({
    barcode,
    parent,
    blob: recordedBlob,
    retries: 0,
    time: Date.now()
  });

  recordedBlob = null;

  document.getElementById("barcode").value = "";

  setStatus("Saved locally ✔");

  refreshUI();

  processQueue(); // auto upload
}

// ================= UPLOAD =================

async function uploadItem(item) {

  const form = new FormData();

  form.append("file", item.blob, "Unboxing.mp4");
  form.append("barcode", item.barcode);
  form.append("parent", item.parent);

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: form
  });

  if (!res.ok) throw new Error("Upload failed");

}

// ================= QUEUE ENGINE =================

async function processQueue() {

  if (uploading) return;
  uploading = true;

  while (true) {

    const items = await getAll();

    if (items.length === 0) break;

    const item = items[0];

    try {

      setStatus("Uploading...");

      await uploadItem(item);

      deleteItem(item.id);

      setStatus("Uploaded ✔");

      refreshUI();

      await new Promise(r => setTimeout(r, 400));

    } catch (err) {

      item.retries++;

      console.log(err);

      if (item.retries > 5) {

        deleteItem(item.id);

        setStatus("Dropped failed item");

      } else {

        await new Promise(r => setTimeout(r, 2000 * item.retries));

      }
    }
  }

  uploading = false;

  setStatus("Idle ✔");
}

</script>

</body>
</html>
