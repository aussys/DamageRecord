<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Damage Recorder</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; padding: 12px; }
button, select, input { width: 100%; padding: 12px; margin: 6px 0; }
video { width: 100%; }
#reader { width: 100%; }
small { color: gray; }
</style>
</head>

<body>

<h2>Damage Recorder</h2>

<select id="parent">
  <option value="1">Damage Form [1]</option>
  <option value="2">Damage Form [2]</option>
</select>

<input id="barcode" placeholder="Scan barcode" readonly>

<button onclick="scanBarcode()">Scan Barcode</button>

<div id="reader"></div>

<hr>

<video id="preview" autoplay playsinline muted></video>

<button onclick="startRecording()">Start</button>
<button onclick="stopRecording()">Stop</button>
<button onclick="saveToQueue()">Save (Queue Upload)</button>

<div id="status"></div>

<hr>

<h3>Queue</h3>
<div id="queueInfo"></div>

<script>

const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE";

let scanner;
let recorder;
let stream;
let chunks = [];
let recordedBlob = null;

// ================= QUEUE =================

let queue = [];
let uploading = false;

// ================= UI =================

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function updateQueueUI() {
  document.getElementById("queueInfo").innerHTML =
    "Pending: " + queue.length;
}

// ================= BARCODE =================

function scanBarcode() {

  document.getElementById("reader").innerHTML = "";

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(cameras => {

    const camId = cameras[cameras.length - 1].id;

    scanner.start(
      camId,
      { fps: 10, qrbox: 250 },
      text => {

        document.getElementById("barcode").value = text;

        scanner.stop();
        document.getElementById("reader").innerHTML = "";

      }
    );

  });

}

// ================= RECORD =================

async function startRecording() {

  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { ideal: 640 },
      height: { ideal: 480 }
    },
    audio: true
  });

  document.getElementById("preview").srcObject = stream;

  recorder = new MediaRecorder(stream, {
    mimeType: "video/webm;codecs=vp8",
    videoBitsPerSecond: 300000
  });

  chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.start();

  setStatus("Recording...");
}

// ================= STOP =================

function stopRecording() {

  return new Promise(resolve => {

    recorder.onstop = () => {

      recordedBlob = new Blob(chunks, { type: "video/webm" });

      stream.getTracks().forEach(t => t.stop());

      setStatus("Ready (add to queue)");

      resolve();
    };

    recorder.stop();
  });
}

// ================= SAVE TO QUEUE =================

function saveToQueue() {

  const barcode = document.getElementById("barcode").value;
  const parent = document.getElementById("parent").value;

  if (!barcode || !recordedBlob) {
    alert("Missing barcode or video");
    return;
  }

  queue.push({
    barcode,
    parent,
    blob: recordedBlob,
    retries: 0
  });

  recordedBlob = null;

  updateQueueUI();

  setStatus("Added to queue ✔");

  resetForm();

  processQueue(); // auto start upload
}

// ================= RESET FOR NEXT =================

function resetForm() {

  document.getElementById("barcode").value = "";
  document.getElementById("preview").srcObject = null;
}

// ================= UPLOAD CORE =================

async function uploadItem(item) {

  const form = new FormData();

  form.append("file", item.blob, "Unboxing.mp4");
  form.append("barcode", item.barcode);
  form.append("parent", item.parent);

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: form
  });

  if (!res.ok) throw new Error("Upload failed");

  return await res.text();
}

// ================= QUEUE PROCESSOR =================

async function processQueue() {

  if (uploading) return;
  uploading = true;

  while (queue.length > 0) {

    const item = queue[0];

    try {

      setStatus("Uploading...");

      await uploadItem(item);

      queue.shift();

      updateQueueUI();

      setStatus("Uploaded ✔ next...");

      // small delay before next
      await new Promise(r => setTimeout(r, 500));

    } catch (err) {

      item.retries++;

      console.log("Upload failed:", err);

      if (item.retries >= 5) {

        alert("Upload failed permanently after 5 retries");
        queue.shift();

      } else {

        const wait = 2000 * item.retries;

        setStatus("Retrying in " + wait/1000 + "s...");

        await new Promise(r => setTimeout(r, wait));
      }
    }
  }

  uploading = false;
  setStatus("Queue empty ✔");
}

</script>

</body>
</html>
