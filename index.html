<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Damage Upload</title>

<style>

body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:30px auto;
    padding:20px;
}

.row{
    display:flex;
    gap:10px;
}

input,
select,
button{
    padding:12px;
}

select{
    flex:1;
}

#folderName{
    flex:1;
}

button{
    cursor:pointer;
}

#status{
    margin-top:20px;
}

progress{
    width:100%;
    display:none;
}

video{
    width:100%;
    margin-top:10px;
}

</style>
</head>
<body>

<h2>Damage Video Upload</h2>

<div class="row">

<select id="folderSelect">

<option value="1">
Damage Form [1]
</option>

<option value="2">
Damage Form [2]
</option>

</select>

<button id="lockBtn">
🔒 Lock
</button>

</div>

<br>

<div class="row">

<input
    id="folderName"
    placeholder="Folder Name / Barcode">

<button id="scanBtn">
📷 Scan
</button>

</div>

<br>

<input
type="file"
id="videoFile"
accept="video/*">

<video
id="preview"
controls
style="display:none">
</video>

<br><br>

<button id="uploadBtn">
Upload
</button>

<br><br>

<progress
id="progress"
max="100"
value="0">
</progress>

<div id="status"></div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxY4JKOrVwsgkcLBNLnfM8erlcrT-YFq6gAazH1j0H_6qzD6IgoPyXlRW7rHBnJOaEM/exec";

const folderSelect =
document.getElementById(
"folderSelect"
);

const lockBtn =
document.getElementById(
"lockBtn"
);

const folderName =
document.getElementById(
"folderName"
);

const progress =
document.getElementById(
"progress"
);

const statusDiv =
document.getElementById(
"status"
);

const preview =
document.getElementById(
"preview"
);

function loadSettings(){

    const savedFolder =
        localStorage.getItem(
            "selectedFolder"
        );

    const locked =
        localStorage.getItem(
            "folderLocked"
        );

    if(savedFolder){
        folderSelect.value =
            savedFolder;
    }

    if(locked==="true"){

        folderSelect.disabled =
            true;

        lockBtn.innerText =
            "🔓 Unlock";
    }
}

loadSettings();

lockBtn.onclick=function(){

    if(folderSelect.disabled){

        folderSelect.disabled=
            false;

        localStorage.setItem(
            "folderLocked",
            "false"
        );

        lockBtn.innerText=
            "🔒 Lock";

    }else{

        folderSelect.disabled=
            true;

        localStorage.setItem(
            "folderLocked",
            "true"
        );

        localStorage.setItem(
            "selectedFolder",
            folderSelect.value
        );

        lockBtn.innerText=
            "🔓 Unlock";
    }
};

folderSelect.onchange=function(){

    localStorage.setItem(
        "selectedFolder",
        folderSelect.value
    );
};

document
.getElementById(
"videoFile"
)
.onchange=function(){

    const file =
        this.files[0];

    if(!file)return;

    preview.src =
        URL.createObjectURL(
            file
        );

    preview.style.display=
        "block";
};

document
.getElementById(
"scanBtn"
)
.onclick=function(){

    const code =
    prompt(
        "Enter scanned barcode"
    );

    if(code){

        folderName.value=
            code.trim();
    }
};

document
.getElementById(
"uploadBtn"
)
.onclick=async function(){

    const file =
    document
    .getElementById(
        "videoFile"
    )
    .files[0];

    if(!file){

        alert(
            "Select video"
        );

        return;
    }

    if(!folderName.value.trim()){

        alert(
            "Folder name required"
        );

        return;
    }

    const MAX_SIZE =
    19*1024*1024;

    if(file.size > MAX_SIZE){

        alert(
        "Video must be under 19 MB"
        );

        return;
    }

    progress.style.display=
        "block";

    progress.value=20;

    const reader =
    new FileReader();

    reader.onload =
    async function(e){

        progress.value=60;

        const base64 =
        e.target.result
        .split(",")[1];

        const response =
        await fetch(
            SCRIPT_URL,
            {
                method:"POST",
                body:JSON.stringify({

                    folder:
                        folderSelect.value,

                    folderName:
                        folderName.value,

                    fileName:
                        "Video.mp4",

                    mimeType:
                        "video/mp4",

                    fileData:
                        base64
                })
            }
        );

        const result =
            await response.json();

        progress.value=100;

        if(result.success){

            statusDiv.innerHTML=
            "✅ Uploaded";

        }else{

            statusDiv.innerHTML=
            "❌ "+
            result.error;
        }
    };

    reader.readAsDataURL(
        file
    );
};

</script>

</body>
</html>
