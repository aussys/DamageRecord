<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/html5-qrcode"></script>
  <script>

let scanner;

function scanBarcode() {

  document
    .getElementById("reader")
    .innerHTML = "";

  scanner =
    new Html5Qrcode("reader");

  Html5Qrcode.getCameras()
    .then(cameras => {

      if (!cameras.length) {

        alert("No camera found");

        return;

      }

      const cameraId =
        cameras[cameras.length - 1].id;

      scanner.start(
        cameraId,
        {
          fps:10,
          qrbox:250
        },
        decodedText => {

          document
            .getElementById("barcode")
            .value =
            decodedText;

          scanner.stop();

          document
            .getElementById("reader")
            .innerHTML = "";

        }
      );

    });

}

</script>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Damage Recorder</title>

<style>
body{
  font-family:Arial;
  padding:20px;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
}

video{
  width:100%;
  margin-top:15px;
}
</style>
</head>

<body>

<h2>Damage Recorder</h2>

<select id="parent">
  <option value="1">Damage Form [1]</option>
  <option value="2">Damage Form [2]</option>
</select>

<br><br>

<input
  id="barcode"
  readonly
  placeholder="Scan barcode first">

<br><br>

<button onclick="scanBarcode()">
  Scan Barcode
</button>

<div id="reader"></div>

</body>
</html>
