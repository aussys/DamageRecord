<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damage Upload Form</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f8;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-top:0;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}

select,
input[type=file]{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    cursor:pointer;
    border:none;
    border-radius:6px;
    padding:12px 18px;
    font-size:15px;
}

#lockBtn{
    margin-top:10px;
    background:#ff9800;
    color:white;
}

#uploadBtn{
    width:100%;
    margin-top:20px;
    background:#2196f3;
    color:white;
}

#uploadBtn:hover{
    opacity:.9;
}

.locked{
    background:#ececec;
}

.progress-wrapper{
    margin-top:15px;
    display:none;
}

progress{
    width:100%;
    height:24px;
}

.status{
    margin-top:15px;
    padding:10px;
    border-radius:6px;
    display:none;
}

.success{
    background:#d4edda;
    color:#155724;
}

.error{
    background:#f8d7da;
    color:#721c24;
}

.info{
    background:#e7f3ff;
    color:#0c5460;
}

.small{
    font-size:13px;
    color:#666;
}
</style>
</head>
<body>

<div class="container">

    <h1>Damage Upload Form</h1>

    <label>Destination Folder</label>

    <select id="folderSelect">
        <option value="1">Damage Form [1]</option>
        <option value="2">Damage Form [2]</option>
    </select>

    <button id="lockBtn">🔒 Lock Selection</button>

    <div class="small">
        Folder selection can be locked and will remain after refresh.
    </div>

    <label>Select File</label>
    <input type="file" id="fileInput">

    <button id="uploadBtn">
        Upload File
    </button>

    <div class="progress-wrapper" id="progressWrapper">
        <progress id="progressBar" value="0" max="100"></progress>
    </div>

    <div id="status" class="status"></div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxY4JKOrVwsgkcLBNLnfM8erlcrT-YFq6gAazH1j0H_6qzD6IgoPyXlRW7rHBnJOaEM/exec";

const folderSelect = document.getElementById("folderSelect");
const lockBtn = document.getElementById("lockBtn");
const uploadBtn = document.getElementById("uploadBtn");

function showStatus(message,type){

    const status = document.getElementById("status");

    status.style.display = "block";
    status.className = "status " + type;
    status.innerHTML = message;
}

function saveFolder(){
    localStorage.setItem(
        "selectedFolder",
        folderSelect.value
    );
}

function loadSettings(){

    const folder =
        localStorage.getItem("selectedFolder");

    const locked =
        localStorage.getItem("folderLocked");

    if(folder){
        folderSelect.value = folder;
    }

    if(locked === "true"){
        lockFolder();
    }
}

function lockFolder(){

    folderSelect.disabled = true;
    folderSelect.classList.add("locked");

    lockBtn.textContent =
        "🔓 Unlock Selection";

    localStorage.setItem(
        "folderLocked",
        "true"
    );

    saveFolder();
}

function unlockFolder(){

    folderSelect.disabled = false;
    folderSelect.classList.remove("locked");

    lockBtn.textContent =
        "🔒 Lock Selection";

    localStorage.setItem(
        "folderLocked",
        "false"
    );
}

lockBtn.addEventListener("click",()=>{

    if(folderSelect.disabled){
        unlockFolder();
    }else{
        lockFolder();
    }

});

folderSelect.addEventListener(
    "change",
    saveFolder
);

loadSettings();

uploadBtn.addEventListener(
    "click",
    uploadFile
);

function uploadFile(){

    const file =
        document.getElementById(
            "fileInput"
        ).files[0];

    if(!file){

        showStatus(
            "Please select a file first.",
            "error"
        );

        return;
    }

    showStatus(
        "Preparing upload...",
        "info"
    );

    document.getElementById(
        "progressWrapper"
    ).style.display = "block";

    document.getElementById(
        "progressBar"
    ).value = 20;

    const reader = new FileReader();

    reader.onload = async function(event){

        try{

            const base64 =
                event.target.result
                .split(",")[1];

            document.getElementById(
                "progressBar"
            ).value = 60;

            const response =
                await fetch(
                    SCRIPT_URL,
                    {
                        method:"POST",
                        body:JSON.stringify({

                            folder:
                                folderSelect.value,

                            fileName:
                                file.name,

                            mimeType:
                                file.type ||
                                "application/octet-stream",

                            fileData:
                                base64
                        })
                    }
                );

            const result =
                await response.json();

            document.getElementById(
                "progressBar"
            ).value = 100;

            if(result.success){

                showStatus(
                    `
                    ✅ Upload Successful<br><br>
                    <a href="${result.url}" target="_blank">
                    Open Uploaded File
                    </a>
                    `,
                    "success"
                );

                document.getElementById(
                    "fileInput"
                ).value = "";

            }else{

                showStatus(
                    result.error ||
                    "Upload failed.",
                    "error"
                );
            }

        }catch(error){

            showStatus(
                error.message,
                "error"
            );
        }
    };

    reader.readAsDataURL(file);
}
</script>

</body>
</html>
